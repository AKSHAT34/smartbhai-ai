:root{--primary:#6C2BD9;--primary-light:#8B5CF6;--accent:#F59E0B;--success:#10B981;--danger:#EF4444;--bg:#0a0a1a;--card:#12122a;--card2:#1a1a35;--border:#2a2a4a;--text:#e0e0f0;--muted:#7a7a9a;--glow:rgba(108,43,217,0.3)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
/* 3D Animated Background */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:float 20s infinite ease-in-out}
.bg-orb:nth-child(1){width:600px;height:600px;background:var(--primary);top:-10%;left:-10%;animation-delay:0s}
.bg-orb:nth-child(2){width:500px;height:500px;background:var(--accent);bottom:-10%;right:-10%;animation-delay:-7s}
.bg-orb:nth-child(3){width:400px;height:400px;background:#3B82F6;top:40%;left:50%;animation-delay:-14s}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(108,43,217,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,43,217,0.03) 1px,transparent 1px);background-size:60px 60px;transform:perspective(500px) rotateX(60deg);transform-origin:center top;opacity:0.5}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(50px,-30px) scale(1.1)}50%{transform:translate(-20px,40px) scale(0.95)}75%{transform:translate(30px,20px) scale(1.05)}}
/* Layout */
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px}
/* Header Nav */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(18,18,42,0.8);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;margin-bottom:30px;position:sticky;top:10px;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff}
.nav-tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px}
.nav-tab{padding:8px 18px;border-radius:10px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.3s;font-family:inherit;white-space:nowrap}
.nav-tab.active{background:var(--primary);color:#fff;box-shadow:0 4px 15px rgba(108,43,217,0.4)}
.nav-tab:hover:not(.active){color:var(--text);background:rgba(108,43,217,0.1)}
</style>
</head>

<style>
/* Sections */
.tab-content{display:none;animation:fadeUp 0.5s ease-out}
.tab-content.active{display:block}

/* Hero */
.hero{text-align:center;padding:60px 20px 40px}
.hero h1{font-size:clamp(32px,5vw,52px);font-weight:900;background:linear-gradient(135deg,#fff,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;margin-bottom:16px}

.hero-stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.hero-stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 28px;min-width:160px;transition:transform 0.3s,box-shadow 0.3s}

.hero-stat .label{font-size:12px;color:var(--muted);margin-top:4px}
/* Section Headers */
.section{margin-bottom:40px}
.section-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(108,43,217,0.15);border:1px solid rgba(108,43,217,0.3);color:var(--primary-light);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.section h2{font-size:28px;font-weight:800;margin-bottom:8px}
.section .subtitle{color:var(--muted);font-size:15px;margin-bottom:24px;line-height:1.5}
/* Cards Grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all 0.3s;cursor:default;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));opacity:0;transition:opacity 0.3s}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.3);border-color:var(--primary)}
.card:hover::before{opacity:1}
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
.card h3{font-size:16px;font-weight:700;margin-bottom:8px}
.card p{font-size:13px;color:var(--muted);line-height:1.6}
.card-tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;margin-top:10px;text-transform:uppercase;letter-spacing:0.5px}
/* Flowchart Boxes */
.flow-container{display:flex;flex-direction:column;align-items:center;gap:0;margin:30px 0}
.flow-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 28px;text-align:center;max-width:500px;width:100%;transition:all 0.3s;position:relative}
.flow-box:hover{border-color:var(--primary);box-shadow:0 0 30px var(--glow);transform:scale(1.02)}
.flow-box h4{font-size:14px;font-weight:700;margin-bottom:4px}
.flow-box p{font-size:12px;color:var(--muted)}
.flow-arrow{width:2px;height:30px;background:linear-gradient(180deg,var(--primary),transparent);position:relative}
.flow-arrow::after{content:'▼';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);color:var(--primary);font-size:10px}
/* Comparison Table */
.compare-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:20px 0}
.compare-table th{background:var(--card2);padding:14px 18px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border)}
.compare-table td{padding:14px 18px;font-size:13px;border-bottom:1px solid rgba(42,42,74,0.5);transition:background 0.2s}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:hover td{background:rgba(108,43,217,0.05)}
/* Progress Bars */
.progress-item{margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.progress-label span:first-child{font-weight:600}
.progress-label span:last-child{color:var(--muted)}
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 1.5s ease-out;width:0}
/* Persona Cards */
.persona-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all 0.3s;cursor:pointer}
.persona-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.persona-card.expanded .persona-details{max-height:300px;opacity:1;margin-top:14px}
.persona-emoji{font-size:36px;margin-bottom:10px}
.persona-name{font-size:16px;font-weight:700}
.persona-who{font-size:12px;color:var(--muted);margin-top:4px}
.persona-profile{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;margin-top:8px}
.persona-details{max-height:0;opacity:0;overflow:hidden;transition:all 0.4s ease-out}
.persona-details p{font-size:13px;color:var(--muted);line-height:1.6;margin-top:6px}
/* Indicator Cards */
.indicator-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.3s}
.indicator-card:hover{border-color:var(--primary);box-shadow:0 0 20px var(--glow)}
.indicator-card.expanded .indicator-body{max-height:200px;opacity:1;margin-top:12px}
.indicator-header{display:flex;justify-content:space-between;align-items:center}
.indicator-header h4{font-size:14px;font-weight:700}
.indicator-signal{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
.indicator-body{max-height:0;opacity:0;overflow:hidden;transition:all 0.4s}
.indicator-body p{font-size:13px;color:var(--muted);line-height:1.6}
.indicator-body .analogy{font-style:italic;color:var(--accent);margin-top:6px}
/* Accent colors */
.bg-purple{background:rgba(108,43,217,0.15)}
.bg-amber{background:rgba(245,158,11,0.15)}
.bg-green{background:rgba(16,185,129,0.15)}
.bg-red{background:rgba(239,68,68,0.15)}
.bg-blue{background:rgba(59,130,246,0.15)}
.text-purple{color:var(--primary-light)}
.text-amber{color:var(--accent)}
.text-green{color:var(--success)}
.text-red{color:var(--danger)}
.text-blue{color:#60A5FA}
.tag-green{background:rgba(16,185,129,0.15);color:var(--success)}
.tag-amber{background:rgba(245,158,11,0.15);color:var(--accent)}
.tag-red{background:rgba(239,68,68,0.15);color:var(--danger)}
.tag-purple{background:rgba(108,43,217,0.15);color:var(--primary-light)}
/* Architecture Diagram */
.arch-layer{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;transition:all 0.3s}
.arch-layer:hover{border-color:var(--primary);box-shadow:0 0 25px var(--glow)}
.arch-layer-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.arch-items{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.arch-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;transition:all 0.3s}
.arch-item:hover{background:rgba(108,43,217,0.1);border-color:var(--primary)}
.arch-item .ai{font-size:20px;margin-bottom:6px}
.arch-item h5{font-size:12px;font-weight:700;margin-bottom:4px}
.arch-item p{font-size:10px;color:var(--muted);line-height:1.4}
.arch-arrow{text-align:center;font-size:20px;color:var(--primary);margin:8px 0;opacity:0.5}
/* Responsive */
@media(max-width:768px){.nav-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}.nav-tab{font-size:12px;padding:7px 12px}.hero h1{font-size:28px}.hero-stats{gap:10px}.hero-stat{min-width:120px;padding:14px 18px}.hero-stat .num{font-size:22px}.cards-grid{grid-template-columns:1fr}.top-bar{flex-direction:column;gap:12px;position:relative;top:0}}
/* Scroll animations */
.reveal{opacity:0;transform:translateY(30px);transition:all 0.6s ease-out}
.reveal.visible{opacity:1;transform:translateY(0)}
</style>

  <div class="cards-grid">
    <div class="card" style="border-left:3px solid var(--primary)">

      <h3>What is RLHF?</h3>
      <p>Traditional AI gives the same answer to everyone. RLHF trains the model using human feedback signals — thumbs up/down, follow-up questions, trade actions — to learn what each user considers a "good" response. The AI develops a <strong>reward model</strong> that scores responses before showing them.</p>

// ============ TAB SWITCHING ============
const content = document.getElementById('content');
const navTabs = document.getElementById('navTabs');

function showTab(tabId) {
  content.innerHTML = tabs[tabId] || '';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // Trigger reveal animations
  setTimeout(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
  }, 100);
  // Animate progress bars if on answers tab
  if (tabId === 'answers') {
    setTimeout(() => {
      document.querySelectorAll('.progress-fill').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    }, 300);
  }
}

navTabs.addEventListener('click', (e) => {
  const tab = e.target.closest('.nav-tab');
  if (tab) showTab(tab.dataset.tab);
});

// Initial load
showTab('overview');

// Scroll reveal observer
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1 });

new MutationObserver(() => {
  document.querySelectorAll('.reveal:not(.visible)').forEach(el => observer.observe(el));
}).observe(content, { childList: true, subtree: true });
